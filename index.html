<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Creative Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@300;400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0e0e11;
  --surface: #16161b;
  --surface2: #1e1e26;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.14);
  --text: #f0f0f5;
  --muted: rgba(240,240,245,0.45);
  --accent: #c8f060;
  --accent2: #7b68ee;

  --s0: #221f40; --s0t: #b8b0ff;
  --s1: #281e14; --s1t: #f0b060;
  --s2: #0e2030; --s2t: #60c0f8;
  --s3: #28102a; --s3t: #f080d8;
  --s4: #0f2318; --s4t: #60e08a;

  --r: 10px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* bg grid */
body::before {
  content:'';
  position:fixed;
  inset:0;
  background-image:
    linear-gradient(rgba(255,255,255,.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.025) 1px, transparent 1px);
  background-size: 48px 48px;
  pointer-events:none;
  z-index:0;
}

#root { position: relative; z-index: 1; }

/* HEADER */
header {
  padding: 2rem 2rem 1.5rem;
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 1rem;
  border-bottom: 1px solid var(--border);
}
.logo {
  font-family: 'Unbounded', sans-serif;
  font-size: 20px;
  font-weight: 600;
  letter-spacing: -0.5px;
  color: var(--text);
}
.logo span { color: var(--accent); }

.stats-row {
  display: flex;
  gap: 1rem;
  flex-wrap: wrap;
}
.stat-pill {
  font-size: 12px;
  font-weight: 500;
  padding: 5px 14px;
  border-radius: 100px;
  border: 1px solid var(--border2);
  color: var(--muted);
}
.stat-pill b { color: var(--text); font-weight: 600; }

/* ADD BAR */
.add-bar {
  display: flex;
  gap: 10px;
  padding: 1.25rem 2rem;
  border-bottom: 1px solid var(--border);
}
.add-bar input {
  flex: 1;
  max-width: 400px;
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: var(--r);
  padding: 0 16px;
  height: 42px;
  color: var(--text);
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  transition: border-color .15s;
}
.add-bar input::placeholder { color: var(--muted); }
.add-bar input:focus { outline: none; border-color: var(--accent2); }
.btn-add {
  height: 42px;
  padding: 0 20px;
  background: var(--accent);
  color: #0a0a0a;
  border: none;
  border-radius: var(--r);
  font-family: 'Unbounded', sans-serif;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity .15s, transform .1s;
  white-space: nowrap;
  letter-spacing: .3px;
}
.btn-add:hover { opacity: .88; }
.btn-add:active { transform: scale(.97); }

/* BOARD */
.board-wrap {
  padding: 1.25rem 2rem 3rem;
  overflow-x: auto;
}
.board {
  display: grid;
  grid-template-columns: repeat(5, minmax(220px, 1fr));
  gap: 14px;
  min-width: 1100px;
}

.col {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.col-head {
  padding: 14px 16px 12px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 10px;
}
.col-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}
.col-0 .col-dot { background: var(--s0t); }
.col-1 .col-dot { background: var(--s1t); }
.col-2 .col-dot { background: var(--s2t); }
.col-3 .col-dot { background: var(--s3t); }
.col-4 .col-dot { background: var(--s4t); }

.col-label {
  font-family: 'Unbounded', sans-serif;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: .5px;
  text-transform: uppercase;
  flex: 1;
}
.col-0 .col-label { color: var(--s0t); }
.col-1 .col-label { color: var(--s1t); }
.col-2 .col-label { color: var(--s2t); }
.col-3 .col-label { color: var(--s3t); }
.col-4 .col-label { color: var(--s4t); }

.col-count {
  font-size: 11px;
  color: var(--muted);
  background: var(--bg);
  border-radius: 100px;
  padding: 2px 8px;
}

.col-body {
  padding: 12px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  flex: 1;
}
.empty-msg {
  font-size: 12px;
  color: rgba(255,255,255,.2);
  text-align: center;
  padding: 20px 0;
}

/* CARD */
.card {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px;
  cursor: pointer;
  transition: border-color .15s, transform .15s;
  animation: fadeIn .2s ease;
}
@keyframes fadeIn { from { opacity:0; transform: translateY(6px); } to { opacity:1; transform: translateY(0); } }
.card:hover { border-color: var(--border2); transform: translateY(-1px); }

.card-name {
  font-size: 14px;
  font-weight: 500;
  color: var(--text);
  margin-bottom: 6px;
  line-height: 1.4;
}
.card-meta {
  font-size: 11px;
  color: var(--muted);
  margin-bottom: 10px;
}
.card-link-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 11px;
  color: var(--accent2);
  background: rgba(123,104,238,.12);
  border-radius: 4px;
  padding: 3px 7px;
  margin-bottom: 10px;
  text-decoration: none;
  max-width: 100%;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.card-link-badge:hover { opacity: .8; }
.card-actions {
  display: flex;
  gap: 5px;
  flex-wrap: wrap;
}
.card-actions button {
  font-size: 11px;
  height: 26px;
  padding: 0 9px;
  border-radius: 6px;
  border: 1px solid var(--border2);
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  transition: background .12s, color .12s;
  font-family: 'Inter', sans-serif;
}
.card-actions button:hover { background: rgba(255,255,255,.07); color: var(--text); }
.btn-edit { margin-left: auto; }
.btn-del { color: rgba(255,100,100,.6) !important; border-color: rgba(255,100,100,.2) !important; }
.btn-del:hover { background: rgba(255,100,100,.1) !important; color: rgba(255,120,120,1) !important; }

/* MODAL */
.overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.7);
  backdrop-filter: blur(4px);
  z-index: 100;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 1rem;
}
.overlay.open { display: flex; }
.modal {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 16px;
  padding: 1.75rem;
  width: 100%;
  max-width: 420px;
  animation: slideUp .2s ease;
}
@keyframes slideUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
.modal-title {
  font-family: 'Unbounded', sans-serif;
  font-size: 14px;
  font-weight: 600;
  margin-bottom: 1.25rem;
  color: var(--accent);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.field { margin-bottom: 1rem; }
.field label {
  display: block;
  font-size: 11px;
  font-weight: 500;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: .5px;
  margin-bottom: 6px;
}
.field input, .field select, .field textarea {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 8px;
  padding: 10px 12px;
  color: var(--text);
  font-family: 'Inter', sans-serif;
  font-size: 13px;
  transition: border-color .15s;
}
.field input:focus, .field select:focus, .field textarea:focus {
  outline: none; border-color: var(--accent2);
}
.field select option { background: var(--surface2); }
.field textarea { resize: vertical; min-height: 70px; }
.modal-btns {
  display: flex; gap: 8px; justify-content: flex-end; margin-top: 1.25rem;
}
.modal-btns button {
  height: 38px; padding: 0 18px;
  border-radius: 8px;
  font-family: 'Inter', sans-serif;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: opacity .15s;
}
.btn-cancel {
  background: transparent;
  border: 1px solid var(--border2);
  color: var(--muted);
}
.btn-cancel:hover { color: var(--text); }
.btn-save {
  background: var(--accent);
  border: none;
  color: #0a0a0a;
  font-weight: 600;
}
.btn-save:hover { opacity: .85; }

/* toast */
.toast {
  position: fixed;
  bottom: 1.5rem; left: 50%; transform: translateX(-50%) translateY(10px);
  background: var(--surface2);
  border: 1px solid var(--border2);
  color: var(--text);
  border-radius: 100px;
  padding: 10px 20px;
  font-size: 13px;
  opacity: 0;
  transition: opacity .2s, transform .2s;
  z-index: 200;
  pointer-events: none;
  white-space: nowrap;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div id="root">
<header>
  <div class="logo">Creative<span>.</span>Tracker</div>
  <div id="statsRow" class="stats-row"></div>
</header>

<div class="add-bar">
  <input id="newName" placeholder="Название препарата..." autocomplete="off" />
  <button class="btn-add" onclick="addCard()">+ Добавить</button>
</div>

<div class="board-wrap">
  <div id="board" class="board"></div>
</div>
</div>

<!-- Modal -->
<div id="overlay" class="overlay" onclick="overlayClick(event)">
  <div class="modal">
    <div class="modal-title" id="modalTitle"></div>
    <div class="field">
      <label>Название</label>
      <input id="mName" />
    </div>
    <div class="field">
      <label>Этап</label>
      <select id="mStatus">
        <option value="0">✏️ Написание ТЗ</option>
        <option value="1">🔍 Согласование ТЗ с ПМ</option>
        <option value="2">🎨 В работе у дизайнера</option>
        <option value="3">👁 Согласование с клиентом</option>
        <option value="4">🚀 Запущен</option>
      </select>
    </div>
    <div class="field">
      <label>Ссылка на готовый креатив</label>
      <input id="mLink" placeholder="https://..." />
    </div>
    <div class="field">
      <label>Комментарий</label>
      <textarea id="mComment" placeholder="Заметки, детали..."></textarea>
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">Отмена</button>
      <button class="btn-save" onclick="saveModal()">Сохранить</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const COLS = [
  { label: 'Написание ТЗ', emoji: '✏️', cls: 'col-0' },
  { label: 'Согласование ТЗ', emoji: '🔍', cls: 'col-1' },
  { label: 'У дизайнера', emoji: '🎨', cls: 'col-2' },
  { label: 'Согласование', emoji: '👁', cls: 'col-3' },
  { label: 'Запущен', emoji: '🚀', cls: 'col-4' },
];

let cards = [];
let editId = null;
const KEY = 'creative_tracker_v1';

function load() {
  try { cards = JSON.parse(localStorage.getItem(KEY)) || []; } catch { cards = []; }
}
function save() {
  localStorage.setItem(KEY, JSON.stringify(cards));
}
function fmt(ts) {
  if (!ts) return '';
  return new Date(ts).toLocaleDateString('ru-RU', { day: '2-digit', month: '2-digit', year: '2-digit' });
}
function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function addCard() {
  const n = document.getElementById('newName').value.trim();
  if (!n) { document.getElementById('newName').focus(); return; }
  cards.unshift({ id: Date.now(), name: n, status: 0, created: Date.now(), updated: Date.now(), link: '', comment: '' });
  document.getElementById('newName').value = '';
  save(); render();
  toast('Креатив добавлен');
}

document.getElementById('newName').addEventListener('keydown', e => {
  if (e.key === 'Enter') addCard();
});

function moveCard(id, dir) {
  const c = cards.find(x => x.id === id);
  if (!c) return;
  const ns = c.status + dir;
  if (ns < 0 || ns > 4) return;
  c.status = ns; c.updated = Date.now();
  save(); render();
}

function delCard(id) {
  if (!confirm('Удалить этот креатив?')) return;
  cards = cards.filter(x => x.id !== id);
  save(); render();
  toast('Удалено');
}

function openModal(id) {
  editId = id;
  const c = cards.find(x => x.id === id);
  document.getElementById('modalTitle').textContent = c.name;
  document.getElementById('mName').value = c.name;
  document.getElementById('mStatus').value = c.status;
  document.getElementById('mLink').value = c.link || '';
  document.getElementById('mComment').value = c.comment || '';
  document.getElementById('overlay').classList.add('open');
}
function closeModal() {
  document.getElementById('overlay').classList.remove('open');
  editId = null;
}
function overlayClick(e) {
  if (e.target === document.getElementById('overlay')) closeModal();
}
function saveModal() {
  if (!editId) return;
  const c = cards.find(x => x.id === editId);
  const newName = document.getElementById('mName').value.trim();
  if (newName) c.name = newName;
  const ns = parseInt(document.getElementById('mStatus').value);
  if (ns !== c.status) { c.status = ns; c.updated = Date.now(); }
  c.link = document.getElementById('mLink').value.trim();
  c.comment = document.getElementById('mComment').value.trim();
  if (!c.updated) c.updated = Date.now();
  save(); render(); closeModal();
  toast('Сохранено');
}

function render() {
  const board = document.getElementById('board');
  board.innerHTML = '';

  COLS.forEach((col, ci) => {
    const wrap = document.createElement('div');
    wrap.className = `col ${col.cls}`;

    const here = cards.filter(x => x.status === ci);
    wrap.innerHTML = `
      <div class="col-head">
        <div class="col-dot"></div>
        <div class="col-label">${col.emoji} ${col.label}</div>
        <div class="col-count">${here.length}</div>
      </div>
      <div class="col-body" id="col-${ci}"></div>
    `;
    board.appendChild(wrap);

    const body = wrap.querySelector(`#col-${ci}`);
    if (here.length === 0) {
      body.innerHTML = '<div class="empty-msg">— пусто —</div>';
    }
    here.forEach(c => {
      const card = document.createElement('div');
      card.className = 'card';
      let html = `<div class="card-name">${esc(c.name)}</div>`;
      html += `<div class="card-meta">обновлён ${fmt(c.updated)}</div>`;
      if (c.comment) {
        html += `<div class="card-meta" style="margin-top:-4px;margin-bottom:8px;font-style:italic">${esc(c.comment)}</div>`;
      }
      if (c.link) {
        html += `<a class="card-link-badge" href="${esc(c.link)}" target="_blank">🔗 Открыть креатив</a><br>`;
      }
      html += `<div class="card-actions" style="margin-top:8px">`;
      if (c.status > 0) html += `<button onclick="event.stopPropagation();moveCard(${c.id},-1)">← Назад</button>`;
      if (c.status < 4) html += `<button onclick="event.stopPropagation();moveCard(${c.id},1)">Вперёд →</button>`;
      html += `<button class="btn-edit" onclick="event.stopPropagation();openModal(${c.id})">✏ Изменить</button>`;
      html += `<button class="btn-del" onclick="event.stopPropagation();delCard(${c.id})">✕</button>`;
      html += `</div>`;
      card.innerHTML = html;
      body.appendChild(card);
    });
  });

  const total = cards.length;
  const done = cards.filter(x => x.status === 4).length;
  const inProgress = total - done;
  document.getElementById('statsRow').innerHTML = `
    <div class="stat-pill">Всего: <b>${total}</b></div>
    <div class="stat-pill">В работе: <b>${inProgress}</b></div>
    <div class="stat-pill">Запущено: <b>${done}</b></div>
  `;
}

load();
render();
</script>
</body>
</html>
